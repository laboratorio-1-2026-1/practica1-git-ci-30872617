  <body>
    <h1>Hola mundo!</h1>
    <main>
      <h2>Herramientas de Git Aprendidas</h2>
      <table>
        <thead>
          <tr>
            <th>Herramienta</th>
            <th>Descripción</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Git Init</td>
            <td>Inicializa un nuevo repositorio local en la carpeta actual.</td>
          </tr>
          <tr>
            <td>Git Branch</td>
            <td>Permite crear, listar o eliminar ramas de desarrollo.</td>
          </tr>
          <tr>
            <td>Git Merge</td>
            <td>
              Combina los cambios de una rama secundaria a la rama principal.
            </td>
          </tr>
        </tbody>
      </table>
    </main>
